version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - rizeworld-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - rizeworld-network

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/rizeworld
      - REDIS_URL=redis://redis:6379
      - PORT=3001
    depends_on:
      - mongodb
      - redis
    networks:
      - rizeworld-network

networks:
  rizeworld-network:
    driver: bridge

volumes:
  mongo-data:
